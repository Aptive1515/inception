; configuration for php PHP module
; priority=00

; Charset to use in my PHP scripts
default_charset = "UTF-8"

; PHP error handling for production servers
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
track_errors = Off
html_errors = Off

; PHP session settings
session.save_handler = files
session.save_path = "/var/lib/php/session"
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly =
session.serialize_handler = php
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
session.referer_check =
session.cache_limiter = nocache
session.cache_expire = 180
session.use_trans_sid = 0
session.hash_function = 0
session.hash_bits_per_character = 5

; PHP setting for maximum execution time
max_execution_time = 300

; PHP setting for maximum input time
max_input_time = 60

; PHP setting for memory limit
memory_limit = 128M

; PHP setting for post max size
post_max_size = 8M

; PHP setting for upload max filesize
upload_max_filesize = 2M

; PHP setting for max file uploads
max_file_uploads = 20

; PHP setting for date.timezone
date.timezone = "UTC"

; PHP setting for allow_url_fopen
allow_url_fopen = On

; PHP setting for expose PHP
expose_php = Off
